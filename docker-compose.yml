services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-cryptorsi}'
      POSTGRES_USER: '${POSTGRES_USER:-cryptorsi}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-cryptorsi}'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-cryptorsi} -d ${POSTGRES_DB:-cryptorsi}'
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: 'ghcr.io/gwydeonwow/cryptorsi-api:latest'
    environment:
      NODE_ENV: '${NODE_ENV:-production}'
      PORT: '3000'
      HOST: '0.0.0.0'
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-cryptorsi}:${POSTGRES_PASSWORD:-cryptorsi}@postgres:5432/${POSTGRES_DB:-cryptorsi}'
      APP_URL: '${APP_URL:-http://localhost}'
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      BINANCE_ENV: '${BINANCE_ENV:-demo}'
      ALLOW_LIVE_TRADING: '${ALLOW_LIVE_TRADING:-false}'
      APP_ENCRYPTION_KEY: '${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://localhost:3000/api/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  worker:
    image: 'ghcr.io/gwydeonwow/cryptorsi-worker:latest'
    environment:
      NODE_ENV: '${NODE_ENV:-production}'
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-cryptorsi}:${POSTGRES_PASSWORD:-cryptorsi}@postgres:5432/${POSTGRES_DB:-cryptorsi}'
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      BINANCE_ENV: '${BINANCE_ENV:-demo}'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: 'ghcr.io/gwydeonwow/cryptorsi-web:latest'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://127.0.0.1:80/'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata: null
