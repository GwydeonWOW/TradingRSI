services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cryptorsi
      POSTGRES_PASSWORD: cryptorsi
      POSTGRES_DB: cryptorsi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptorsi"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cryptorsi:cryptorsi@postgres:5432/cryptorsi
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      BINANCE_ENV: demo
      ALLOW_LIVE_TRADING: "false"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://cryptorsi:cryptorsi@postgres:5432/cryptorsi
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
